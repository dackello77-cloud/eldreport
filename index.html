<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily ELD Reports</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  min-height:100vh;
  padding:22px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{
  font-size:34px;
  margin:0 0 8px;
}

.subtitle{
  color:#94a3b8;
  margin-bottom:25px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  width:100%;
  max-width:900px;
}

.stat{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:18px;
  padding:22px;
  text-align:center;
}

.stat-title{
  color:#94a3b8;
  font-size:14px;
}

.stat-value{
  font-size:38px;
  font-weight:bold;
  margin-top:10px;
}

.positive{color:#22c55e}
.negative{color:#ef4444}
.neutral{color:#facc15}

.btn{
  margin-top:25px;
  background:#22c55e;
  color:#052e16;
  border:none;
  padding:13px 22px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.section{
  padding:20px;
}

.company-card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
}

.company-name{
  color:#facc15;
  font-weight:bold;
  font-size:18px;
  margin-bottom:12px;
}

.company-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.box{
  background:#0f172a;
  border-radius:12px;
  padding:12px;
  text-align:center;
}

.box span{
  display:block;
  color:#94a3b8;
  font-size:12px;
}

.box b{
  font-size:20px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  justify-content:center;
  align-items:center;
  padding:15px;
}

.modal-content{
  background:#1e293b;
  width:100%;
  max-width:520px;
  border-radius:18px;
  padding:20px;
}

textarea{
  width:100%;
  height:180px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
  border-radius:12px;
  padding:12px;
  resize:none;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.actions button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.save{background:#22c55e;color:#052e16}
.close{background:#64748b;color:white}
</style>
</head>

<body>

<div class="header">
  <h1>Daily ELD Reports</h1>
  <div class="subtitle">M&M Tracking LLC</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-title">Total at Month Start</div>
      <div id="startTotal" class="stat-value">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Total Today</div>
      <div id="todayTotal" class="stat-value">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Change</div>
      <div id="changePercent" class="stat-value neutral">0%</div>
    </div>
  </div>

  <button class="btn" onclick="loadData()">Refresh Data</button>
</div>

<div class="section">
  <div id="companies"></div>
</div>

<div id="noteModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Company Notes</h2>
    <textarea id="noteText" placeholder="Write note here..."></textarea>

    <div class="actions">
      <button class="save" onclick="saveNote()">Save Note</button>
      <button class="close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>

const API_URL = "https://royal-paper-656b.dackello77.workers.dev";
const NOTES_API = "https://script.google.com/macros/s/AKfycbynf1lSFfIufxi2DZMdXplNWiBktNfTTmr9dBOMEp0NtWV8tgcgUy-hpXxyCqqBVxh2/exec";

let currentCompany = "";
window.notes = {};

// ================= NOTES =================

async function loadNotes() {
  const res = await fetch(NOTES_API);
  window.notes = await res.json();
}

// ================= LOAD DATA =================

async function loadData(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const companiesObj = data.data?.companies || {};
  const companies = Object.values(companiesObj);

  renderDashboard(companies);
  renderCompanies(companies);
}

// ================= HELPERS =================

function getMonthStartCount(company){
  const dates = Object.keys(company.dates || {}).sort();
  if(!dates.length) return 0;
  return company.dates[dates[0]].eld_count || 0;
}

function getTodayCount(company){
  const now = new Date();
  const hourUTC = now.getUTCHours();

  let targetDate = new Date(now);

  // 👇 promenjeno na 13 UTC
  if (hourUTC < 13) {
    targetDate.setUTCDate(targetDate.getUTCDate() - 1);
  }

  const dateStr = targetDate.toISOString().slice(0,10);

  if (company.dates && company.dates[dateStr]) {
    return company.dates[dateStr].eld_count || 0;
  }

  return 0;
}

function percentChange(start, today){
  if(start === 0 && today === 0) return 0;
  if(start === 0) return 100;
  return ((today - start) / start * 100).toFixed(1);
}

// ================= DASHBOARD =================

function renderDashboard(companies){
  let startTotal = 0;
  let todayTotal = 0;

  companies.forEach(c => {
    startTotal += getMonthStartCount(c);
    todayTotal += getTodayCount(c);
  });

  const percent = percentChange(startTotal, todayTotal);

  document.getElementById("startTotal").textContent = startTotal;
  document.getElementById("todayTotal").textContent = todayTotal;

  const changeEl = document.getElementById("changePercent");
  changeEl.textContent = percent + "%";

  changeEl.className = "stat-value " + (
    percent > 0 ? "positive" : percent < 0 ? "negative" : "neutral"
  );
}

// ================= COMPANIES =================

function renderCompanies(companies){
  const box = document.getElementById("companies");
  box.innerHTML = "";

  companies.forEach(company => {
    const start = getMonthStartCount(company);
    const today = getTodayCount(company);
    const percent = percentChange(start, today);

    const colorClass = percent > 0 ? "positive" : percent < 0 ? "negative" : "neutral";

    const hasNote = window.notes[company.name];

    const card = document.createElement("div");
    card.className = "company-card";
    card.onclick = () => openModal(company.name);

    card.innerHTML = `
      <div class="company-name">
        ${company.name} ${hasNote ? "📝" : ""}
      </div>

      <div class="company-stats">
        <div class="box">
          <span>Start</span>
          <b>${start}</b>
        </div>

        <div class="box">
          <span>Today</span>
          <b>${today}</b>
        </div>

        <div class="box">
          <span>Change</span>
          <b class="${colorClass}">${percent}%</b>
        </div>
      </div>
    `;

    box.appendChild(card);
  });
}

// ================= MODAL =================

function openModal(companyName){
  currentCompany = companyName;

  document.getElementById("modalTitle").textContent = companyName + " - Notes";
  document.getElementById("noteText").value = window.notes[companyName] || "";

  document.getElementById("noteModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("noteModal").style.display = "none";
}

async function saveNote(){
  const note = document.getElementById("noteText").value;

  await fetch(NOTES_API, {
    method: "POST",
    body: JSON.stringify({
      company: currentCompany,
      note: note
    })
  });

  window.notes[currentCompany] = note;

  closeModal();
}

// ================= INIT =================

async function init(){
  await loadNotes();
  await loadData();
}

init();

</script>

</body>
</html>
